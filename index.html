<script>
// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const COLS=90, ROWS=80;
const ITER=22;
const TEAR=1.36;
const GRAV=0.44;
const DAMP=0.9872;
const MAX_SITES=20;
const REV_FRAMES=180;

// ═══════════════════════════════════════════════════════════════
// STATE

let W=window.innerWidth, H=window.innerHeight;
let pts=[], lks=[], hL=[], vL=[];
let particles=[];
let mode=0;
let flags=new Array(14).fill(false);
let windT=0, vortT=0;
let mx=-999,my=-999,pmx=-999,pmy=-999,mdn=false;
let curSite=0, siteAlpha=1, inTrans=false, transT=0;
let bhX=W/2, bhY=H/2;
let revBuf=[], revIdx=0;
let gTime=0, lastT=performance.now(), frames=0, fps=60;
let glitchT=0;

// ═══════════════════════════════════════════════════════════════
// CANVAS + GL
// ═══════════════════════════════════════════════════════════════
const canvas=document.getElementById('c');
canvas.width=W; canvas.height=H;
canvas.style.width=W+'px'; canvas.style.height=H+'px';
const gl=canvas.getContext('webgl',{alpha:false,antialias:true,powerPreference:'high-performance'});
if(!gl){document.body.innerHTML='<div style="color:#fff;padding:40px;font-family:monospace">WebGL not supported 😔</div>';throw 0;}
gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

// ═══════════════════════════════════════════════════════════════
// SHADERS
// ═══════════════════════════════════════════════════════════════
function mkShader(type,src){
  const s=gl.createShader(type);
  gl.shaderSource(s,src);gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))console.error(gl.getShaderInfoLog(s));
  return s;
}
function mkProg(vs,fs){
  const p=gl.createProgram();
  gl.attachShader(p,mkShader(gl.VERTEX_SHADER,vs));
  gl.attachShader(p,mkShader(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS))console.error(gl.getProgramInfoLog(p));
  return p;
}

// BG shader
const progBG=mkProg(`
attribute vec2 aP;varying vec2 vU;
void main(){vU=aP*.5+.5;gl_Position=vec4(aP,0,1);}
`,`
precision mediump float;
varying vec2 vU;uniform sampler2D uT;uniform float uA,uG,uTm;uniform int uN;
void main(){
  vec2 uv=vU;
  if(uG>0.){float sl=floor(uv.y*40.)/40.;float r=fract(sin(sl*127.1+uTm*3.7)*43758.5);
    if(r<uG*.4)uv.x+=uG*(r-.5)*.1;}
  vec4 c=texture2D(uT,uv);
  if(uN==1)c.rgb=c.rgb*.25+vec3(.01,.01,.06);
  gl_FragColor=vec4(c.rgb,c.a*uA);
}`);

// Cloth shader
const progCloth=mkProg(`
attribute vec2 aP;attribute vec2 aU;attribute float aBn;
varying vec2 vU;varying float vBn;
uniform vec2 uR;
void main(){
  vU=aU;vBn=aBn;
  vec2 n=aP/uR*2.-1.;n.y=-n.y;
  gl_Position=vec4(n,0,1);
}`,`
precision mediump float;
varying vec2 vU;varying float vBn;
uniform sampler2D uT;uniform sampler2D uNs;
uniform float uTm,uRb;
void main(){
  vec2 uv=vU;
  vec2 ns=texture2D(uNs,uv*3.+uTm*.02).rg*2.-1.;
  uv+=ns*.003;
  vec4 c=texture2D(uT,uv);
  if(vBn>0.){
    float b=vBn;
    vec3 fc=mix(vec3(1.,.8,0.),vec3(1.,.1,0.),b);
    fc=mix(fc,vec3(.08,.08,.08),smoothstep(.6,1.,b));
    c.rgb=mix(c.rgb,fc,b*.9);
    c.a=mix(c.a,0.,smoothstep(.7,1.,b));
  }
  if(uRb>0.){
    float h=fract(uv.x+uv.y+uTm*.08)*6.;
    vec3 rgb=clamp(abs(mod(h+vec3(0,4,2),6.)-3.)-1.,0.,1.);
    c.rgb=mix(c.rgb,rgb,uRb*.5);
  }
  gl_FragColor=c;
}`);

// Particle shader
const progPar=mkProg(`
attribute vec2 aP;attribute vec4 aC;attribute float aSz;
varying vec4 vC;uniform vec2 uR;
void main(){
  vC=aC;
  vec2 n=aP/uR*2.-1.;n.y=-n.y;
  gl_Position=vec4(n,0,1);
  gl_PointSize=aSz;
}`,`
precision mediump float;
varying vec4 vC;
void main(){
  vec2 uv=gl_PointCoord*2.-1.;
  float d=dot(uv,uv);if(d>1.)discard;
  gl_FragColor=vec4(vC.rgb,vC.a*(1.-d*.6));
}`);

// Post shader
const progPost=mkProg(`
attribute vec2 aP;varying vec2 vU;
void main(){vU=aP*.5+.5;gl_Position=vec4(aP,0,1);}`,`
precision mediump float;
varying vec2 vU;uniform sampler2D uT;uniform float uTm,uG,uV;
void main(){
  vec2 uv=vU;
  float ca=.0015+uG*.006;
  vec4 c;
  c.r=texture2D(uT,uv+vec2(ca,0)).r;
  c.g=texture2D(uT,uv).g;
  c.b=texture2D(uT,uv-vec2(ca,0)).b;
  c.a=1.;
  float sc=sin(uv.y*800.*3.14159)*.025;c.rgb-=sc;
  vec2 vg=uv*2.-1.;c.rgb*=1.-dot(vg,vg)*.3*uV;
  float gr=fract(sin(dot(uv,vec2(12.9898,78.233))+uTm)*43758.5)*.015-.007;
  c.rgb+=gr;
  gl_FragColor=c;
}`);

// ═══════════════════════════════════════════════════════════════
// BUFFERS + FBO
// ═══════════════════════════════════════════════════════════════
const vboQuad=gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER,vboQuad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);

const vboCloth=gl.createBuffer();
const vboPar=gl.createBuffer();

// FBO
const fbo=gl.createFramebuffer();
gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
const fboTex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,fboTex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,W,H,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,fboTex,0);
gl.bindFramebuffer(gl.FRAMEBUFFER,null);

// Site texture
const siteTex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,siteTex);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR_MIPMAP_LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

// Noise texture
const noiseTex=gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D,noiseTex);
const nd=new Uint8Array(256*256*4);
for(let i=0;i<nd.length;i++)nd[i]=Math.random()*255|0;
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,256,256,0,gl.RGBA,gl.UNSIGNED_BYTE,nd);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);

// ═══════════════════════════════════════════════════════════════
// SITE TEXTURES (20 sites drawn on canvas)
// ═══════════════════════════════════════════════════════════════
const siteCV=document.createElement('canvas');
const sctx=siteCV.getContext('2d');
siteCV.width=W; siteCV.height=H;

const siteNames=['VOID — Tech','NEXUS — Social','LUXE — Shop','CHRONICLE — News',
  'PORTFOLIO','DASHBOARD','WAVE — Music','WEATHER','GRIDLOCK — Games',
  'CHAIN — Crypto','VOYAGE — Travel','MUNCH — Food','MEDIC — Health',
  'LEARN — Edu','HAVEN — Estate','PULSE — Fitness','FRAME — Photos',
  'NOTES','SYNAPSE — AI','MERIDIAN — Mag'];

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}
function wt(c,t,x,y,mw,lh){
  const words=t.split(' ');let line='';
  for(const w of words){const ts=line+w+' ';if(c.measureText(ts).width>mw&&line){c.fillText(line.trim(),x,y);line=w+' ';y+=lh;}else line=ts;}
  if(line.trim())c.fillText(line.trim(),x,y);
}

const siteFns=[
  // 0 VOID
  function(){
    const c=sctx,w=W,h=H;c.textBaseline='middle';
    let g=c.createLinearGradient(0,0,w,h);g.addColorStop(0,'#060612');g.addColorStop(1,'#0a0520');

    // grain
    c.fillStyle='rgba(255,255,255,0.012)';for(let i=0;i<5000;i++)c.fillRect(Math.random()*w,Math.random()*h,1,1);
    // nav
    const nH=h*.072;c.fillStyle='rgba(255,255,255,0.025)';c.fillRect(0,0,w,nH);
    c.strokeStyle='rgba(255,255,255,0.06)';c.lineWidth=1;c.beginPath();c.moveTo(0,nH);c.lineTo(w,nH);c.stroke();
    c.fillStyle='#fff';c.font='bold '+Math.min(17,nH*.38)+'px Courier New';c.fillText('◈ VOID',w*.038,nH*.5);
    c.fillStyle='rgba(255,255,255,0.35)';c.font=Math.min(13,nH*.27)+'px system-ui';
    ['Product','Solutions','Pricing','Docs','Blog'].forEach((t,i)=>c.fillText(t,w*.2+i*w*.1,nH*.5));
    // hero
    const hY=nH+h*.04;
    c.fillStyle='rgba(255,255,255,0.9)';c.font='300 '+Math.min(72,h*.09)+'px Georgia';c.fillText('Rethink',w*.046,hY+h*.12);
    const gr=c.createLinearGradient(w*.046,0,w*.62,0);gr.addColorStop(0,'#a78bfa');gr.addColorStop(1,'#38bdf8');
    c.fillStyle=gr;c.font='bold '+Math.min(72,h*.09)+'px Georgia';c.fillText('everything.',w*.046,hY+h*.225);
    c.fillStyle='rgba(255,255,255,0.38)';c.font=Math.min(16,h*.022)+'px system-ui';
    c.fillText('Infrastructure for teams that move at the speed of thought.',w*.046,hY+h*.305);
    // buttons
    const bg=c.createLinearGradient(w*.046,0,w*.046+w*.18,0);bg.addColorStop(0,'#7c3aed');bg.addColorStop(1,'#6366f1');
    c.fillStyle=bg;c.shadowColor='rgba(124,58,237,0.5)';c.shadowBlur=20;
    rr(c,w*.046,hY+h*.38,w*.18,h*.068,8);c.fill();c.shadowBlur=0;

    // cards
    [{i:'⚡',c2:'#f59e0b',t:'Instant deploys'},{i:'◈',c2:'#a78bfa',t:'Edge compute'},{i:'⊕',c2:'#34d399',t:'Auto-scaling'}].forEach((cd,i)=>{

      c.fillStyle=cgr;rr(c,cx,cy,cw,ch,10);c.fill();

      c.fillStyle=cd.c2;c.font='bold '+Math.min(15,h*.022)+'px system-ui';c.fillText(cd.i+' '+cd.t,cx+w*.018,cy+h*.09);
    });
    // stats
    const sY=hY+h*.77;
    [['99.99%','Uptime'],['<30ms','Latency'],['2M+','Devs'],['$0','To start']].forEach((s,i)=>{

    const ftY=sY+h*.13;
    c.strokeStyle='rgba(255,255,255,0.05)';c.lineWidth=1;c.beginPath();c.moveTo(w*.05,ftY);c.lineTo(w*.95,ftY);c.stroke();
    c.fillStyle='rgba(255,255,255,0.12)';c.font=Math.min(10,h*.014)+'px Courier New';c.textAlign='center';
    c.fillText('© 2025 VOID Inc. — Build without limits.',w/2,ftY+h*.04);c.textAlign='left';
  },
  // 1 NEXUS social
  function(){
    const c=sctx,w=W,h=H;c.textBaseline='middle';
    c.fillStyle='#030308';c.fillRect(0,0,w,h);
    let rg=c.createRadialGradient(w*.3,0,0,w*.3,0,w*.7);rg.addColorStop(0,'rgba(56,189,248,0.09)');rg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=rg;c.fillRect(0,0,w,h);
    c.fillStyle='rgba(255,255,255,0.03)';c.fillRect(0,0,w,h*.08);
    c.fillStyle='#38bdf8';c.font='bold '+Math.min(22,h*.04)+'px Courier New';c.fillText('⬡ NEXUS',w*.04,h*.04);
    c.fillStyle='rgba(255,255,255,0.25)';c.font=Math.min(12,h*.019)+'px system-ui';
    ['Feed','Explore','Messages','Profile'].forEach((t,i)=>c.fillText(t,w*.22+i*w*.13,h*.04));
    for(let i=0;i<5;i++){
      const py=h*.1+i*(h*.155+h*.008);
      c.fillStyle='rgba(255,255,255,0.03)';rr(c,w*.04,py,w*.92,h*.145,12);c.fill();
      c.strokeStyle='rgba(255,255,255,0.05)';c.lineWidth=1;rr(c,w*.04,py,w*.92,h*.145,12);c.stroke();
      const cols=['#f59e0b','#a78bfa','#34d399','#ef4444','#38bdf8'];
      c.fillStyle=cols[i];c.beginPath();c.arc(w*.09,py+h*.04,h*.026,0,Math.PI*2);c.fill();

      c.fillStyle='#171717';c.font='bold '+Math.min(16,h*.022)+'px Georgia';wt(c,a[1],ax,ay+h*.04,w*.44,h*.028);
      if(col2===0){c.strokeStyle='#e5e5e5';c.lineWidth=1;c.beginPath();c.moveTo(ax+w*.45,ay-h*.01);c.lineTo(ax+w*.45,ay+h*.18);c.stroke();}
    });
  }
];

function drawSite(idx){
  siteCV.width=W; siteCV.height=H;
  sctx.clearRect(0,0,W,H);
  siteFns[idx%MAX_SITES]();
  gl.bindTexture(gl.TEXTURE_2D,siteTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,siteCV);
  gl.generateMipmap(gl.TEXTURE_2D);
}

// ═══════════════════════════════════════════════════════════════
// CLOTH INIT
// ═══════════════════════════════════════════════════════════════
function initCloth(){
  pts=[]; lks=[]; particles=[];
  hL=Array.from({length:ROWS},()=>new Array(COLS).fill(null));
  vL=Array.from({length:ROWS},()=>new Array(COLS).fill(null));
  revBuf=[]; revIdx=0;
  const sp=Math.min(W,H)/Math.max(COLS,ROWS)*1.06;
  const sx=(W-(COLS-1)*sp)/2;
  const sy=H*0.04;
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const x=sx+c*sp, y=sy+r*sp;
      pts.push({x,y,px:x,py:y,ox:x,oy:y,pin:r===0,burnt:false,burn:false,bt:0});
    }
  }
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const i=r*COLS+c;
      if(c<COLS-1){const lk={a:i,b:i+1,rest:sp,torn:false};lks.push(lk);hL[r][c]=lk;}
      if(r<ROWS-1){const lk={a:i,b:i+COLS,rest:sp,torn:false};lks.push(lk);vL[r][c]=lk;}
    }
  }
  document.getElementById('iPts').textContent=pts.length+' pts';
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function rnd(a,b){return a+(b-a)*Math.random();}
function clamp(v,a,b){return v<a?a:v>b?b:v;}
function tornRatio(){let t=0;for(const l of lks)if(l.torn)t++;return lks.length?t/lks.length:0;}

function spawnSpark(x,y,fire){
  const n=fire?10:5;
  for(let i=0;i<n;i++){
    particles.push({
      x:x+rnd(-3,3),y:y+rnd(-3,3),
      vx:rnd(-1,1)*(fire?2.5:5),vy:fire?-rnd(1,5):rnd(-1,1)*5,
      life:1,decay:0.012+Math.random()*0.025,
      size:fire?5+rnd(0,4):2+rnd(0,2.5),
      r:fire?1:0.8,g:fire?0.4+rnd(0,.4):0.75,b:fire?0:1,a:0.9,type:fire?1:0
    });
  }
}
function spawnSmoke(x,y){
  for(let i=0;i<3;i++) particles.push({x:x+rnd(-5,5),y,vx:rnd(-.5,.5),vy:-rnd(.5,1.5),life:1,decay:0.008+Math.random()*.01,size:8+rnd(0,10),r:.35,g:.35,b:.35,a:.4,type:3});
}

// ═══════════════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════════════
function physics(){
  const slow=flags[6]?0.3:1;
  windT+=0.022*slow; vortT+=0.018*slow;
  const windX=flags[0]?(Math.sin(windT)*2.8+Math.sin(windT*.62)*1.1):0;
  const windY=flags[5]?(Math.sin(windT*1.3)*1.5):0;
  const stormX=flags[3]?((Math.random()-.5)*8*Math.sin(windT*.5)):0;
  const grav=flags[2]?-GRAV:GRAV;
  const mdx=(mx-pmx)*slow, mdy=(my-pmy)*slow;

  // Time reverse
  if(flags[13]){
    if(revIdx>0){
      revIdx--;
      const n=pts.length;
      for(let i=0;i<n;i++){
        pts[i].x=revBuf[revIdx][i*2];pts[i].y=revBuf[revIdx][i*2+1];
        pts[i].px=pts[i].x;pts[i].py=pts[i].y;
      }
    }
    return;
  } else {
    if(revBuf.length<REV_FRAMES){
      const fr=new Float32Array(pts.length*2);
      for(let i=0;i<pts.length;i++){fr[i*2]=pts[i].x;fr[i*2+1]=pts[i].y;}
      revBuf.push(fr);revIdx=revBuf.length;
    }
  }

  const sp=Math.min(W,H)/Math.max(COLS,ROWS)*1.06;

  for(const p of pts){
    if(p.pin||p.burnt) continue;
    let vx=(p.x-p.px)*DAMP, vy=(p.y-p.py)*DAMP;
    // Vortex
    if(flags[4]){const dx=p.x-W/2,dy=p.y-H/2,d=Math.sqrt(dx*dx+dy*dy)+1,str=Math.min(80,3000/d);vx+=(-dy/d)*str*.004*slow;vy+=(dx/d)*str*.004*slow;}
    // Blackhole
    if(flags[12]){const dx=p.x-bhX,dy=p.y-bhY,d=Math.sqrt(dx*dx+dy*dy)+1,str=Math.min(200,8000/d);vx-=(dx/d)*str*.006*slow;vy-=(dy/d)*str*.006*slow;}
    // Magnetic
    if(flags[11]&&mdn){const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy)+1;if(d<200){const s=(200-d)/200*4;vx-=(dx/d)*s;vy-=(dy/d)*s;}}
    p.px=p.x;p.py=p.y;
    p.x+=vx+(windX+stormX)*.3*slow;
    p.y+=vy+(grav+windY)*slow;
    p.y=clamp(p.y,-160,H+160);p.x=clamp(p.x,-100,W+100);
  }

  // Mouse interaction
  if(mdn){
    const reach=sp*(mode===2||mode===3?5.5:mode===7?7:2.8);
    for(const p of pts){
      if(p.pin||p.burnt) continue;
      const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);
      if(d<reach){
        const f=(1-d/reach);
        if(mode===0){p.x+=mdx*f*1.6;p.y+=mdy*f*1.6;}
        else if(mode===2){const nf=f*f*3.5,dd=d+.01;p.px=p.x+dx/dd*nf;p.py=p.y+dy/dd*nf;}
        else if(mode===3){const nf=f*f*3.5,dd=d+.01;p.px=p.x-dx/dd*nf;p.py=p.y-dy/dd*nf;}
        else if(mode===7){const dd=d+.01;p.x-=dx/dd*f*4*slow;p.y-=dy/dd*f*4*slow;}
        else if(mode===8){const nf=f*f*6,dd=d+.01;p.px=p.x+dx/dd*nf;p.py=p.y+dy/dd*nf;}
      }
    }
  }

  // Constraints
  for(let it=0;it<ITER;it++){
    for(const lk of lks){
      if(lk.torn) continue;
      const a=pts[lk.a],b=pts[lk.b];
      const dx=b.x-a.x,dy=b.y-a.y;
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<.001) continue;
      if(dist>lk.rest*TEAR){
        lk.torn=true;
        if(Math.random()<.5) spawnSpark((a.x+b.x)*.5,(a.y+b.y)*.5,false);
        continue;
      }
      const diff=(dist-lk.rest)/dist*.5;
      const mx2=dx*diff,my2=dy*diff;
      if(!a.pin&&!a.burnt){a.x+=mx2;a.y+=my2;}
      if(!b.pin&&!b.burnt){b.x-=mx2;b.y-=my2;}
    }
  }

  // Fire
  if(flags[1]&&Math.random()<.2){const fc=Math.floor(Math.random()*COLS);const fp=pts[(ROWS-1)*COLS+fc];if(!fp.burn&&!fp.burnt)fp.burn=true;}
  for(let r=ROWS-1;r>=0;r--){
    for(let c=0;c<COLS;c++){
      const p=pts[r*COLS+c];if(!p.burn)continue;
      p.bt+=slow;
      if(p.bt>26+Math.random()*22){
        p.burn=false;p.burnt=true;
        for(const lk of lks)if(lk.a===r*COLS+c||lk.b===r*COLS+c)lk.torn=true;
        spawnSpark(p.x,p.y,true);spawnSmoke(p.x,p.y);
      }
      if(r>0&&Math.random()<.07){const np=pts[(r-1)*COLS+c];if(!np.burn&&!np.burnt)np.burn=true;}
      if(c>0&&Math.random()<.022){const np=pts[r*COLS+c-1];if(!np.burn&&!np.burnt)np.burn=true;}
      if(c<COLS-1&&Math.random()<.022){const np=pts[r*COLS+c+1];if(!np.burn&&!np.burnt)np.burn=true;}
    }
  }

  // Storm lightning
  if(flags[3]&&Math.random()<.008){
    const lx=Math.random()*W;
    for(let i=0;i<8;i++) particles.push({x:lx+rnd(-20,20),y:H*.5*i/8,vx:0,vy:0,life:1,decay:.15,size:3+rnd(0,3),r:.8,g:.9,b:1,a:1,type:4});
  }
  // Rain
  if(flags[3]&&Math.random()<.4) particles.push({x:Math.random()*W,y:-10,vx:-1.5,vy:rnd(8,14),life:1,decay:.02,size:2,r:.6,g:.8,b:1,a:.5,type:2});
  // Snow
  if(flags[8]&&Math.random()<.3) particles.push({x:Math.random()*W,y:-10,vx:rnd(-.5,.5),vy:rnd(1,3),life:1,decay:.004,size:rnd(2,5),r:1,g:1,b:1,a:.8,type:5});

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*slow;p.y+=p.vy*slow;
    if(p.type===1)p.vy-=.06;else if(p.type===3)p.vy-=.04;else if(p.type===0)p.vy+=.12;else p.vy+=.05;
    p.vx*=.97;p.life-=p.decay*slow;
    if(p.life<=0||p.y>H+50) particles.splice(i,1);
  }
  if(particles.length>4000) particles.length=4000;

  // Blackhole follows mouse
  if(flags[12]){bhX+=(mx-bhX)*.05;bhY+=(my-bhY)*.05;}

  // Auto transition
  if(!inTrans&&tornRatio()>.82){inTrans=true;transT=0;}
}

// ═══════════════════════════════════════════════════════════════
// TOOLS
// ═══════════════════════════════════════════════════════════════
function ptSegDist(px,py,ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,l2=dx*dx+dy*dy;
  if(l2<.001)return Math.hypot(px-ax,py-ay);
  const t=clamp(((px-ax)*dx+(py-ay)*dy)/l2,0,1);
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}
function cutAt(x,y,px2,py2){
  const sp=Math.min(W,H)/Math.max(COLS,ROWS)*1.06*.7;
  for(const lk of lks){
    if(lk.torn)continue;
    const a=pts[lk.a],b=pts[lk.b];
    if(ptSegDist(x,y,a.x,a.y,b.x,b.y)<sp){lk.torn=true;spawnSpark((a.x+b.x)*.5,(a.y+b.y)*.5,false);}
  }
}
function burnAt(x,y){const sp=Math.min(W,H)/Math.max(COLS,ROWS)*3;for(const p of pts){if(!p.burn&&!p.burnt){const dx=p.x-x,dy=p.y-y;if(dx*dx+dy*dy<sp*sp)p.burn=true;}}}
function pinAt(x,y){const sp=Math.min(W,H)/Math.max(COLS,ROWS)*2.5;for(const p of pts){const dx=p.x-x,dy=p.y-y;if(dx*dx+dy*dy<sp*sp)p.pin=!p.pin;}}
function freezeAt(x,y){const sp=Math.min(W,H)/Math.max(COLS,ROWS)*3;for(const p of pts){const dx=p.x-x,dy=p.y-y;if(dx*dx+dy*dy<sp*sp){p.px=p.x;p.py=p.y;}}}

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render(){
  const glitch=flags[7]?0.6:0;

  // Pass 1 → FBO
  gl.bindFramebuffer(gl.FRAMEBUFFER,fbo);
  gl.viewport(0,0,W,H);
  gl.clearColor(0.008,0.008,0.06,1);gl.clear(gl.COLOR_BUFFER_BIT);

  // BG
  gl.useProgram(progBG);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,siteTex);
  gl.uniform1i(gl.getUniformLocation(progBG,'uT'),0);
  gl.uniform1f(gl.getUniformLocation(progBG,'uA'),siteAlpha);
  gl.uniform1f(gl.getUniformLocation(progBG,'uG'),glitch);
  gl.uniform1f(gl.getUniformLocation(progBG,'uTm'),gTime);
  gl.uniform1i(gl.getUniformLocation(progBG,'uN'),flags[9]?1:0);
  gl.bindBuffer(gl.ARRAY_BUFFER,vboQuad);
  const bgPos=gl.getAttribLocation(progBG,'aP');
  gl.enableVertexAttribArray(bgPos);gl.vertexAttribPointer(bgPos,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);

  // Cloth triangles
  const cv=[];
  for(let r=0;r<ROWS-1;r++){
    for(let c=0;c<COLS-1;c++){
      const ht=hL[r][c],hb=hL[r+1]&&hL[r+1][c];
      const vl=vL[r][c],vr=vL[r][c+1];
      if(!ht||!hb||!vl||!vr)continue;
      const p00=pts[r*COLS+c],p01=pts[r*COLS+c+1];
      const p10=pts[(r+1)*COLS+c],p11=pts[(r+1)*COLS+c+1];
      if(p00.burnt||p01.burnt||p10.burnt||p11.burnt)continue;
      const b00=p00.burn?clamp(p00.bt/48,0,1):0;
      const b01=p01.burn?clamp(p01.bt/48,0,1):0;
      const b10=p10.burn?clamp(p10.bt/48,0,1):0;
      const b11=p11.burn?clamp(p11.bt/48,0,1):0;
      if(!ht.torn&&!vl.torn){
        cv.push(p00.x,p00.y,p00.ox/W,p00.oy/H,b00);
        cv.push(p01.x,p01.y,p01.ox/W,p01.oy/H,b01);
        cv.push(p10.x,p10.y,p10.ox/W,p10.oy/H,b10);
      }
      if(!hb.torn&&!vr.torn){
        cv.push(p01.x,p01.y,p01.ox/W,p01.oy/H,b01);
        cv.push(p11.x,p11.y,p11.ox/W,p11.oy/H,b11);
        cv.push(p10.x,p10.y,p10.ox/W,p10.oy/H,b10);
      }
    }
  }
  if(cv.length){
    gl.useProgram(progCloth);
    gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,siteTex);
    gl.activeTexture(gl.TEXTURE1);gl.bindTexture(gl.TEXTURE_2D,noiseTex);
    gl.uniform1i(gl.getUniformLocation(progCloth,'uT'),0);
    gl.uniform1i(gl.getUniformLocation(progCloth,'uNs'),1);
    gl.uniform2f(gl.getUniformLocation(progCloth,'uR'),W,H);
    gl.uniform1f(gl.getUniformLocation(progCloth,'uTm'),gTime);
    gl.uniform1f(gl.getUniformLocation(progCloth,'uRb'),flags[10]?1:0);
    gl.bindBuffer(gl.ARRAY_BUFFER,vboCloth);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(cv),gl.DYNAMIC_DRAW);
    const stride=5*4;
    const aP=gl.getAttribLocation(progCloth,'aP');
    const aU=gl.getAttribLocation(progCloth,'aU');
    const aBn=gl.getAttribLocation(progCloth,'aBn');
    gl.enableVertexAttribArray(aP);gl.vertexAttribPointer(aP,2,gl.FLOAT,false,stride,0);
    gl.enableVertexAttribArray(aU);gl.vertexAttribPointer(aU,2,gl.FLOAT,false,stride,8);
    gl.enableVertexAttribArray(aBn);gl.vertexAttribPointer(aBn,1,gl.FLOAT,false,stride,16);
    gl.drawArrays(gl.TRIANGLES,0,cv.length/5);
  }

  // Particles
  if(particles.length){
    const pv=[];
    for(const p of particles) pv.push(p.x,p.y,p.r,p.g,p.b,p.a*p.life,p.size*p.life);
    gl.useProgram(progPar);
    gl.uniform2f(gl.getUniformLocation(progPar,'uR'),W,H);
    gl.bindBuffer(gl.ARRAY_BUFFER,vboPar);
    gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(pv),gl.DYNAMIC_DRAW);
    const stride2=7*4;
    const aP2=gl.getAttribLocation(progPar,'aP');
    const aC=gl.getAttribLocation(progPar,'aC');
    const aSz=gl.getAttribLocation(progPar,'aSz');
    gl.enableVertexAttribArray(aP2);gl.vertexAttribPointer(aP2,2,gl.FLOAT,false,stride2,0);
    gl.enableVertexAttribArray(aC);gl.vertexAttribPointer(aC,4,gl.FLOAT,false,stride2,8);
    gl.enableVertexAttribArray(aSz);gl.vertexAttribPointer(aSz,1,gl.FLOAT,false,stride2,24);
    gl.drawArrays(gl.POINTS,0,particles.length);
  }

  // Pass 2 → screen
  gl.bindFramebuffer(gl.FRAMEBUFFER,null);
  gl.viewport(0,0,W,H);gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(progPost);
  gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,fboTex);
  gl.uniform1i(gl.getUniformLocation(progPost,'uT'),0);
  gl.uniform1f(gl.getUniformLocation(progPost,'uTm'),gTime);
  gl.uniform1f(gl.getUniformLocation(progPost,'uG'),glitch);
  gl.uniform1f(gl.getUniformLocation(progPost,'uV'),1);
  gl.bindBuffer(gl.ARRAY_BUFFER,vboQuad);
  const pP=gl.getAttribLocation(progPost,'aP');
  gl.enableVertexAttribArray(pP);gl.vertexAttribPointer(pP,2,gl.FLOAT,false,0,0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ═══════════════════════════════════════════════════════════════
// ACTIONS
// ═══════════════════════════════════════════════════════════════
function resetCloth(){initCloth();toast('↺ Reset');}
function doShake(){for(const p of pts)if(!p.pin){const vx=rnd(-18,18),vy=rnd(-18,18);p.px=p.x-vx;p.py=p.y-vy;}toast('〜 Shake!');}
function doExplode(){const cx=W/2,cy=H/2;for(const p of pts){if(p.pin)continue;const dx=p.x-cx,dy=p.y-cy,d=Math.hypot(dx,dy)+1,f=420/d;p.px=p.x-dx/d*f;p.py=p.y-dy/d*f;}for(const lk of lks)if(Math.random()<.35)lk.torn=true;toast('💥 Explode!');}
function doTearAll(){for(const lk of lks)lk.torn=true;toast('✕ All torn!');}
function nextSite(){curSite=(curSite+1)%MAX_SITES;drawSite(curSite);initCloth();siteAlpha=0;updateInfo();toast('→ '+siteNames[curSite]);}
function prevSite(){curSite=(curSite+MAX_SITES-1)%MAX_SITES;drawSite(curSite);initCloth();siteAlpha=0;updateInfo();toast('← '+siteNames[curSite]);}

function setMode(m,label){
  mode=m;
  for(let i=0;i<9;i++)document.getElementById('b'+i).classList.remove('on','on2','on3','on4');
  document.getElementById('b'+m).classList.add('on');
  document.getElementById('iMode').textContent=label;
  canvas.style.cursor=m===1?'none':'crosshair';toast(label);
}
function togF(idx,id,cls,label){
  flags[idx]=!flags[idx];
  document.getElementById(id).classList.toggle(cls,flags[idx]);
  toast(label+(flags[idx]?' ON':' OFF'));
}
function updateInfo(){document.getElementById('iSite').textContent='SITE '+(curSite+1)+'/'+MAX_SITES+': '+siteNames[curSite];}

// ═══════════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════════
let lastPos={x:0,y:0};
function getPos(e){
  const r=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e;
  return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
}
canvas.addEventListener('mousedown',e=>{const p=getPos(e);lastPos=p;mx=p.x;my=p.y;mdn=true;});
canvas.addEventListener('mousemove',e=>{
  const p=getPos(e);pmx=mx;pmy=my;mx=p.x;my=p.y;
  if(!mdn)return;
  if(mode===1)cutAt(p.x,p.y,lastPos.x,lastPos.y);
  if(mode===4)burnAt(p.x,p.y);
  if(mode===5)pinAt(p.x,p.y);
  if(mode===6)freezeAt(p.x,p.y);
  lastPos=p;
});
canvas.addEventListener('mouseup',()=>mdn=false);
canvas.addEventListener('dblclick',resetCloth);
canvas.addEventListener('touchstart',e=>{e.preventDefault();const p=getPos(e);lastPos=p;mx=p.x;my=p.y;mdn=true;},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();const p=getPos(e);pmx=mx;pmy=my;mx=p.x;my=p.y;
  if(mode===1)cutAt(p.x,p.y,lastPos.x,lastPos.y);
  if(mode===4)burnAt(p.x,p.y);
  if(mode===5)pinAt(p.x,p.y);
  if(mode===6)freezeAt(p.x,p.y);
  lastPos=p;
},{passive:false});
canvas.addEventListener('touchend',()=>mdn=false);

window.addEventListener('resize',()=>{
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  gl.bindTexture(gl.TEXTURE_2D,fboTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,W,H,0,gl.RGBA,gl.UNSIGNED_BYTE,null);
  drawSite(curSite);initCloth();
});

// Toast
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.style.opacity='1';
  clearTimeout(toast._t);toast._t=setTimeout(()=>el.style.opacity='0',2000);
}

// ═══════════════════════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════════════════════
function loop(ts){
  gTime=ts*.001;
  const dt=.016;
  frames++;
  const now=performance.now();
  if(now-lastT>500){fps=Math.round(frames/((now-lastT)/1000));frames=0;lastT=now;
    document.getElementById('iFps').textContent=fps+' FPS';
    document.getElementById('iTorn').textContent=Math.round(tornRatio()*100)+'% TORN';
  }

  // Transition
  if(inTrans){
    transT+=dt;siteAlpha=1-clamp(transT/.6,0,1);
    if(transT>.8){curSite=(curSite+1)%MAX_SITES;drawSite(curSite);initCloth();siteAlpha=0;inTrans=false;transT=0;updateInfo();}
  } else siteAlpha=clamp(siteAlpha+dt*1.5,0,1);

  physics();
  pmx=mx;pmy=my;
  render();
  requestAnimationFrame(loop);
}

// START
drawSite(0);
initCloth();
updateInfo();
toast('✦ TEARABLE — drag to tear!');
requestAnimationFrame(loop);
</script>
